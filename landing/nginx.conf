# Honour X-Forwarded-Proto set by Nginx Proxy Manager so redirects stay https.
map $http_x_forwarded_proto $redirect_scheme {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# Build the omni / it-tools subdomain from whatever host the request arrived on
# so that redirects work correctly for both local (tools.localtest.me:8080) and
# production (tools.n8-g.com) without hard-coding either.
map $http_host $omni_host {
    ~^tools\.(?<rest>.+)$  omni.tools.$rest;
    default                 omni.tools.n8-g.com;
}

map $http_host $it_host {
    ~^tools\.(?<rest>.+)$  it.tools.$rest;
    default                 it.tools.n8-g.com;
}

# ── tools.* — landing page + CyberChef ──────────────────────────────────────
server {
    listen 80;
    server_name tools.n8-g.com tools.localtest.me;

    root  /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    location = / {
        try_files /index.html =404;
    }

    # Legacy redirects so landing page links continue to work after the move.
    location = /omni {
        return 301 $redirect_scheme://$omni_host/;
    }
    location /omni/ {
        return 301 $redirect_scheme://$omni_host/;
    }

    location = /it-tools {
        return 301 $redirect_scheme://$it_host/;
    }
    location /it-tools/ {
        return 301 $redirect_scheme://$it_host/;
    }

    # CyberChef remains path-based on the tools host.
    location = /cyberchef {
        return 301 $redirect_scheme://$http_host/cyberchef/;
    }
    location /cyberchef/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://cyberchef:8080/;
    }
}

# ── omni.tools.* — Omni Tools at / ──────────────────────────────────────────
server {
    listen 80;
    server_name omni.tools.n8-g.com omni.tools.localtest.me;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://omni-tools:80/;
    }
}

# ── it.tools.* — IT Tools at / ──────────────────────────────────────────────
server {
    listen 80;
    server_name it.tools.n8-g.com it.tools.localtest.me;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://it-tools:80/;
    }
}
